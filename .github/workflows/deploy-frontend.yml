name: Deploy Frontend to Vercel

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: |
          cd frontend
          flutter pub get

      - name: Build web
        run: |
          cd frontend
          flutter build web --release \
            --dart-define=BASE_URL=https://dil-pratik.onrender.com \
            --dart-define=API_BASE_URL=https://dil-pratik.onrender.com/api

      - name: Copy vercel.json to build output
        run: cp frontend/vercel.json frontend/build/web/vercel.json

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./frontend/build/web
          vercel-args: '--prod'
